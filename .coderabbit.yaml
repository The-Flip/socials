# CodeRabbit configuration
# https://docs.coderabbit.ai/reference/configuration

reviews:
  tools:
    languagetool:
      enabled: false
  path_filters:
    # Autogenerated from docs/AGENTS.src.md (review the source, not the output)
    - "!CLAUDE.md"
    - "!AGENTS.md"
    # Virtual environment and caches
    - "!.venv/**"
    - "!.mypy_cache/**"
    - "!.ruff_cache/**"
    - "!.pytest_cache/**"
    # Lockfile (regenerated by uv)
    - "!uv.lock"
    # IDE/editor configs
    - "!.idea/**"
    # Environment files
    - "!.env"
